name: Generate Jobs Digest

on:
  schedule:
    # Every Monday at 7:00am UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Allows you to run it manually from the Actions tab anytime

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run digest script
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: node generate-digest.js

      - name: Commit and push updated digest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Weekly jobs digest $(date +'%Y-%m-%d')"
          git push
